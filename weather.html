<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Bonaire Weather · KNMI</title>
<style>
  :root {
    --accent:  #5ee6c8;
    --warm:    #ffb45e;
    --blue:    #5ea8ff;
    --muted:   #8a8a8e;
    --card:    rgba(255,255,255,0.055);
    --border:  rgba(255,255,255,0.09);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    min-height:100%; background:#000; color:#fff;
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body {
    padding:clamp(14px,2vw,36px); max-width:1400px; margin:0 auto;
    background:
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(94,230,200,.06), transparent 70%),
      radial-gradient(ellipse 50% 35% at 90% 100%, rgba(94,168,255,.05), transparent 70%),
      #000;
    background-attachment:fixed;
  }

  /* ── Header ── */
  .hdr {
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:8px;
    padding-bottom:clamp(12px,1.8vh,22px);
    border-bottom:1px solid var(--border);
    margin-bottom:clamp(16px,2.5vh,32px);
  }
  .hdr-title { font-size:clamp(15px,1.6vw,22px); font-weight:700; color:var(--accent); letter-spacing:.04em; }
  .hdr-title em { color:var(--muted); font-style:normal; font-weight:500; }
  .hdr-right { display:flex; align-items:center; gap:clamp(10px,1.5vw,22px); }
  .hdr-obstime { color:var(--muted); font-size:clamp(11px,1.1vw,14px); font-weight:500; }
  .hdr-refresh {
    display:flex; align-items:center; gap:5px; cursor:pointer;
    color:var(--muted); font-size:clamp(11px,1.1vw,14px); font-weight:500;
    border:1px solid var(--border); border-radius:99px;
    padding:4px 12px; transition:color .2s,border-color .2s;
  }
  .hdr-refresh:hover { color:var(--accent); border-color:var(--accent); }
  .hdr-refresh svg { flex-shrink:0; }
  .hdr-countdown { font-variant-numeric:tabular-nums; }
  .spin { animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Hero ── */
  .hero {
    display:flex; align-items:center; gap:clamp(16px,3vw,52px);
    background:var(--card); border-radius:clamp(12px,1.5vw,20px);
    padding:clamp(18px,3vw,40px);
    margin-bottom:clamp(10px,1.4vw,16px);
  }
  .hero-ico {
    font-size:clamp(60px,9vw,110px); line-height:1; flex-shrink:0;
    filter:drop-shadow(0 0 24px rgba(94,230,200,.35));
  }
  .hero-main { flex:1; min-width:0; }
  .hero-temp {
    font-size:clamp(56px,9vw,110px); font-weight:700;
    line-height:.88; letter-spacing:-.02em; font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff 30%,#b8d8d0 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero-cond { color:var(--accent); font-size:clamp(17px,2.2vw,30px); font-weight:600; margin-top:.2em; }
  .hero-sub  { color:var(--muted);  font-size:clamp(12px,1.3vw,17px); font-weight:500; margin-top:.35em; }

  /* ── Grid ── */
  .grid {
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:clamp(8px,1vw,14px);
  }
  .c3  { grid-column:span 3; }
  .c4  { grid-column:span 4; }
  .c6  { grid-column:span 6; }
  .c12 { grid-column:span 12; }
  @media(max-width:800px){
    .c3,.c4 { grid-column:span 6; }
    .c6     { grid-column:span 12; }
  }
  @media(max-width:500px){
    .c3,.c4,.c6 { grid-column:span 12; }
  }

  /* ── Card ── */
  .card {
    background:linear-gradient(160deg, rgba(255,255,255,.085), rgba(255,255,255,.03));
    border:1px solid var(--border);
    border-radius:clamp(10px,1.2vw,16px);
    padding:clamp(14px,1.8vw,24px);
    display:flex; flex-direction:column; gap:clamp(6px,1vh,10px);
    box-shadow:0 4px 16px rgba(0,0,0,.35);
  }
  .lbl {
    color:var(--muted); font-size:clamp(10px,.9vw,12px); font-weight:600;
    text-transform:uppercase; letter-spacing:.08em; line-height:1;
  }
  .val {
    font-size:clamp(26px,3.8vw,52px); font-weight:700;
    line-height:1; font-variant-numeric:tabular-nums;
  }
  .sub { color:var(--muted); font-size:clamp(11px,1.1vw,14px); font-weight:500; line-height:1.2; }

  /* ── Bar ── */
  .bar { height:clamp(4px,.55vh,6px); background:rgba(255,255,255,.1); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; transition:width .7s ease; width:0%; box-shadow:0 0 8px currentColor; }

  /* ── Row list inside card ── */
  .rows { display:flex; flex-direction:column; gap:clamp(8px,1.2vh,14px); }
  .row  { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .row-lbl { color:var(--muted); font-size:clamp(11px,1vw,14px); font-weight:500; }
  .row-val  { font-size:clamp(13px,1.5vw,19px); font-weight:700; font-variant-numeric:tabular-nums; text-align:right; }

  /* ── Compass ── */
  .compass-wrap { display:flex; align-items:center; gap:clamp(10px,1.5vw,20px); margin-top:2px; }
  .compass-text .val { font-size:clamp(28px,4vw,50px); }

  /* ── Sun arc ── */
  .sun-arc-wrap { display:flex; align-items:center; gap:clamp(12px,1.8vw,24px); }
  .sun-times { flex-shrink:0; text-align:center; }
  .sun-times .lbl { margin-bottom:4px; }
  .sun-times .val { font-size:clamp(18px,2.2vw,28px); color:var(--warm); }
  .sun-svg  { flex:1; overflow:visible; }

  /* ── Octa visual ── */
  .octa-wrap { display:flex; gap:4px; align-items:center; margin-top:4px; }
  .octa-seg {
    flex:1; height:clamp(5px,.7vh,8px); border-radius:3px;
    background:rgba(255,255,255,.12);
    transition:background .5s;
  }
  .octa-seg.filled { background:#aaa; }
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-title">BONAIRE WEATHER <em>· KNMI STATION</em></div>
  <div class="hdr-right">
    <span class="hdr-obstime" id="obstime">Connecting…</span>
    <span class="hdr-refresh" id="refreshBtn">
      <svg id="refreshIco" width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M12 7A5 5 0 1 1 7 2c1.4 0 2.66.57 3.57 1.5L12 5V2"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="hdr-countdown" id="countdown">5:00</span>
    </span>
  </div>
</div>

<!-- Hero -->
<div class="hero" style="margin-bottom:clamp(10px,1.4vw,16px)">
  <span class="hero-ico" id="h-ico">⛅</span>
  <div class="hero-main">
    <div class="hero-temp" id="h-temp">--°C</div>
    <div class="hero-cond" id="h-cond">Loading…</div>
    <div class="hero-sub"  id="h-sub">&nbsp;</div>
  </div>
</div>

<!-- Data grid -->
<div class="grid">

  <!-- Wind speed -->
  <div class="card c4">
    <div class="lbl">Wind speed</div>
    <div class="val" id="d-wind">--</div>
    <div class="sub" id="d-wind-bft">&nbsp;</div>
    <div class="bar"><div class="bar-fill" id="b-wind" style="background:var(--accent)"></div></div>
  </div>

  <!-- Gust -->
  <div class="card c4">
    <div class="lbl">Gust</div>
    <div class="val" id="d-gust" style="color:var(--warm)">--</div>
    <div class="sub" id="d-gust-sub">&nbsp;</div>
    <div class="bar"><div class="bar-fill" id="b-gust" style="background:var(--warm)"></div></div>
  </div>

  <!-- Compass direction -->
  <div class="card c4">
    <div class="lbl">Wind direction</div>
    <div class="compass-wrap">
      <svg width="80" height="80" viewBox="0 0 80 80" style="flex-shrink:0">
        <circle cx="40" cy="40" r="36" stroke="var(--border)" stroke-width="1.5" fill="none"/>
        <!-- tick marks -->
        <line x1="40" y1="6" x2="40" y2="12" stroke="var(--muted)" stroke-width="1.2"/>
        <line x1="74" y1="40" x2="68" y2="40" stroke="var(--muted)" stroke-width="1.2"/>
        <line x1="40" y1="74" x2="40" y2="68" stroke="var(--muted)" stroke-width="1.2"/>
        <line x1="6" y1="40" x2="12" y2="40" stroke="var(--muted)" stroke-width="1.2"/>
        <text x="40" y="5" text-anchor="middle" dominant-baseline="auto"
              fill="var(--accent)" font-size="9" font-family="system-ui" font-weight="700">N</text>
        <text x="76" y="43" text-anchor="middle"
              fill="var(--muted)" font-size="8" font-family="system-ui">E</text>
        <text x="40" y="79" text-anchor="middle"
              fill="var(--muted)" font-size="8" font-family="system-ui">S</text>
        <text x="4" y="43" text-anchor="middle"
              fill="var(--muted)" font-size="8" font-family="system-ui">W</text>
        <!-- Arrow: head points toward center (wind coming FROM this direction) -->
        <g id="compass-arrow" transform="rotate(0,40,40)">
          <polygon points="40,10 36,54 40,48 44,54" fill="var(--accent)"/>
          <polygon points="40,70 36,26 40,32 44,26" fill="rgba(94,230,200,.25)"/>
        </g>
        <circle cx="40" cy="40" r="3.5" fill="#fff"/>
      </svg>
      <div class="compass-text">
        <div class="val" id="d-dir">--</div>
        <div class="sub" id="d-dir-deg"></div>
      </div>
    </div>
  </div>

  <!-- Humidity -->
  <div class="card c3">
    <div class="lbl">Humidity</div>
    <div class="val" style="color:var(--blue)" id="d-rh">--%</div>
    <div class="bar"><div class="bar-fill" id="b-rh" style="background:var(--blue)"></div></div>
  </div>

  <!-- Dewpoint -->
  <div class="card c3">
    <div class="lbl">Dewpoint</div>
    <div class="val" id="d-dew">--°C</div>
    <div class="sub" id="d-dew-feel">&nbsp;</div>
  </div>

  <!-- Pressure -->
  <div class="card c3">
    <div class="lbl">Pressure</div>
    <div class="val" id="d-slp">-- <span style="font-size:.42em;font-weight:500;color:var(--muted)">hPa</span></div>
    <div class="sub" id="d-slp-state">&nbsp;</div>
  </div>

  <!-- Visibility -->
  <div class="card c3">
    <div class="lbl">Visibility</div>
    <div class="val" id="d-vis">--</div>
    <div class="sub" id="d-vis-qual">&nbsp;</div>
    <div class="bar"><div class="bar-fill" id="b-vis" style="background:var(--muted)"></div></div>
  </div>

  <!-- Cloud cover -->
  <div class="card c6">
    <div class="lbl">Cloud cover</div>
    <div class="val" id="d-cloud">--</div>
    <div class="octa-wrap" id="octa-segs"></div>
  </div>

  <!-- Precipitation -->
  <div class="card c3">
    <div class="lbl">Precipitation</div>
    <div class="val" style="color:var(--blue)" id="d-precip">--</div>
    <div class="sub">per 10 min</div>
    <div class="bar"><div class="bar-fill" id="b-precip" style="background:var(--blue)"></div></div>
  </div>

  <!-- Solar radiation -->
  <div class="card c3">
    <div class="lbl">Solar radiation</div>
    <div class="val" style="color:var(--warm)" id="d-rad">--</div>
    <div class="sub" id="d-rad-sub">&nbsp;</div>
    <div class="bar"><div class="bar-fill" id="b-rad" style="background:var(--warm)"></div></div>
  </div>

  <!-- Sun arc -->
  <div class="card c12">
    <div class="lbl">Daylight — Curaçao / Bonaire</div>
    <div class="sun-arc-wrap">
      <div class="sun-times">
        <div class="lbl">🌅 Sunrise</div>
        <div class="val" id="d-sunrise" style="color:var(--warm)">--:--</div>
      </div>
      <svg class="sun-svg" height="90" viewBox="0 0 500 90" preserveAspectRatio="none">
        <!-- Night track -->
        <path d="M 20 82 Q 250 -8 480 82"
              stroke="rgba(255,255,255,.1)" stroke-width="2" fill="none"
              pathLength="1"/>
        <!-- Elapsed day -->
        <path id="arc-elapsed" d="M 20 82 Q 250 -8 480 82"
              stroke="var(--warm)" stroke-width="2.5" fill="none"
              pathLength="1" stroke-dasharray="0 1"/>
        <!-- Sun dot -->
        <circle id="sun-dot" cx="20" cy="82" r="8" fill="var(--warm)" opacity="0">
          <animate attributeName="opacity" dur="2s" values="0.7;1;0.7" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div class="sun-times">
        <div class="lbl">🌇 Sunset</div>
        <div class="val" id="d-sunset" style="color:var(--warm)">--:--</div>
      </div>
    </div>
    <div class="sub" id="d-daylight">&nbsp;</div>
  </div>

</div><!-- /grid -->

<script>
// ════════════════════════════════
//  KNMI Bonaire scraper (RWC module)
// ════════════════════════════════
const KNMI_URL = 'https://www.knmidc.org/weather/bonaire/?Current';

async function fetchKnmiPage(){
  const proxies = [
    u => 'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
    u => 'https://r.jina.ai/'+u,
    u => u
  ];
  for(const wrap of proxies){
    try{
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      const r = await fetch(wrap(KNMI_URL), {signal: ctrl.signal});
      clearTimeout(t);
      if(r.ok){ const text = await r.text(); if(text && text.length > 500) return text; }
    }catch(e){}
  }
  return null;
}

function parseKnmiBonaire(raw){
  if(!raw) return null;
  let html = String(raw)
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
    .replace(/&#39;/g,"'").replace(/&amp;/g,'&');
  const out = {};
  const tm = html.match(/Bonaire<br\s*\/?>([^<]+UTC)/i);
  if(tm) out.time = tm[1].trim();
  const rowRe = /<td[^>]*>\s*<smalli>\s*([^<]+?)\s*<\/td>\s*<th[^>]*>\s*<center>\s*([^<]+?)\s*(?:<smalli>\s*([^<]*?)\s*(?:<\/smalli>)?)?\s*<\/th>/gi;
  let m;
  while((m = rowRe.exec(html)) !== null){
    const label = m[1].replace(/&deg;/g,'°').replace(/\s+/g,' ').trim();
    const value = (m[2]||'').replace(/&nbsp;/g,' ').trim();
    const extra = (m[3]||'').replace(/[()%]/g,'').trim();
    out[label] = {value, extra};
  }
  if(Object.keys(out).filter(k => k !== 'time').length >= 3) return out;
  const text = html.replace(/<[^>]+>/g,' ').replace(/&deg;/g,'°').replace(/&nbsp;/g,' ').replace(/\s+/g,' ');
  const pairs = [
    ['Winddirection (Sector/deg)', /Winddirection[^A-Za-z]*\(?Sector\/deg\)?\s*([NESW]{1,3})\s*\(?\s*(\d{1,3})/i, true],
    ['Windspeed',       /Windspeed[^0-9-]*([\d.]+)/i],
    ['Gusts',           /Gusts[^0-9-]*([\d.]+)/i],
    ['Cloud cover',     /Cloud cover[^0-9-]*([\d.]+)/i],
    ['Radiation',       /Radiation[^0-9-]*([\d.]+)/i],
    ['Precipitation',   /Precipitation[^0-9-]*([\d.]+)/i],
    ['Relative humidity',/Relative humidity[^0-9-]*([\d.]+)/i],
    ['Temperature (°C)',/Temperature[^0-9-]*(-?[\d.]+)/i],
    ['Dewpoint',        /Dewpoint[^0-9-]*(-?[\d.]+)/i],
    ['Visibility',      /Visibility[^0-9-]*([\d.]+)/i],
    ['Pressure',        /Pressure[^0-9-]*([\d.]+)/i]
  ];
  pairs.forEach(([key, re, isDir]) => {
    const mm = text.match(re);
    if(mm) out[key] = {value: mm[1], extra: isDir ? (mm[2]||'') : ''};
  });
  if(!out.time){
    const tt = text.match(/Bonaire\s+([A-Za-z]{3},?\s+\d{1,2}\s+\w+\s+\d{4}\s+[\d:]+\s*UTC)/);
    if(tt) out.time = tt[1].trim();
  }
  return out;
}

function knmiToNormalized(parsed){
  if(!parsed) return null;
  const find = sub => { for(const k in parsed){ if(k.indexOf(sub) >= 0) return parsed[k]; } return null; };
  const num  = rec  => { if(!rec || rec.value == null) return null; const n = parseFloat(rec.value); return isFinite(n) ? n : null; };
  const windMs = num(find('Windspeed')), gustMs = num(find('Gusts')), wd = find('Winddirection');
  return {
    temp_c:     num(find('Temperature (')),
    dew_c:      num(find('Dewpoint')),
    rh:         num(find('Relative humidity')),
    wind_ms:    windMs,
    wind_kt:    windMs != null ? Math.round(windMs * 1.94384) : null,
    gust_ms:    gustMs,
    gust_kt:    gustMs != null ? Math.round(gustMs * 1.94384) : null,
    wind_dir:   wd && wd.extra ? parseFloat(wd.extra) : null,
    wind_sector:wd ? wd.value : null,
    cloud_octa: num(find('Cloud cover')),
    radiation:  num(find('Radiation')),
    precip_10m: num(find('Precipitation')),
    vis_m:      num(find('Visibility')),
    slp:        num(find('Pressure')),
    time:       parsed.time || null,
    ts:         Date.now()
  };
}

// ════════════════════════════════
//  Helpers
// ════════════════════════════════
function degToCompass(d){
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
}
function bft(ms){
  if(ms == null) return '';
  const scale = [0,.3,1.6,3.4,5.5,8,10.8,13.9,17.2,20.8,24.5,28.5,32.7];
  const names = ['Calm','Light air','Light breeze','Gentle breeze','Moderate breeze',
                 'Fresh breeze','Strong breeze','Near gale','Gale','Strong gale',
                 'Storm','Violent storm','Hurricane'];
  let b = 0;
  for(let i = 0; i < scale.length; i++) if(ms >= scale[i]) b = i;
  return 'Bft · '+b+' — '+names[b];
}
function fmtVis(m){
  if(m == null) return '--';
  if(m >= 10000) return '> 10 km';
  if(m >= 1000)  return (m/1000).toFixed(1)+' km';
  return m+' m';
}
function visQual(m){
  if(m == null) return '';
  if(m >= 10000) return 'Excellent'; if(m >= 5000) return 'Good';
  if(m >= 1000)  return 'Moderate';  return 'Poor';
}
function cloudLabel(octa){
  if(octa == null) return '--';
  const l = ['Clear','Almost clear','Few','Scattered','Broken','Mostly cloudy','Mostly cloudy','Overcast','Overcast'];
  return octa+'/8 — '+(l[Math.round(octa)] || '');
}
function slpState(hpa){
  if(hpa == null) return '';
  if(hpa >= 1020) return 'High pressure';
  if(hpa >= 1013) return 'Near normal';
  if(hpa >= 1000) return 'Low pressure';
  return 'Very low';
}
function heatIndex(t, rh){
  if(t == null || rh == null || t < 27) return null;
  const hi = -8.785 + 1.611*t + 2.339*rh - .146*t*rh
             - .012*t*t - .016*rh*rh + .002*t*t*rh + .0007*t*rh*rh - 0.000003*t*t*rh*rh;
  return Math.round(hi);
}
function cloudIcon(octa, precip){
  if(precip != null && precip > 0.2) return '🌧️';
  if(octa == null) return '⛅';
  if(octa <= 1) return '☀️'; if(octa <= 3) return '🌤️'; if(octa <= 5) return '⛅'; return '☁️';
}
function cloudText(octa, precip){
  if(precip != null && precip > 0.2) return 'Rain';
  if(octa == null) return '';
  if(octa <= 1) return 'Clear'; if(octa <= 3) return 'Partly cloudy';
  if(octa <= 5) return 'Mostly cloudy'; return 'Overcast';
}
function fmtTime(iso){
  const [,time] = iso.split('T');
  let [h,m] = time.split(':');
  h = parseInt(h,10);
  const ap = h < 12 ? 'AM' : 'PM';
  h = (h % 12) || 12;
  return h+':'+m+' '+ap;
}

// ════════════════════════════════
//  Sunrise / sunset
// ════════════════════════════════
async function fetchSunriseSunset(){
  const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=12.17&longitude=-68.99&daily=sunrise,sunset&timezone=auto&forecast_days=1');
  if(!r.ok) throw new Error('http '+r.status);
  const d = await r.json();
  return {sunrise: d.daily.sunrise[0], sunset: d.daily.sunset[0]};
}

function updateSunArc(sunriseIso, sunsetIso){
  const parse = iso => { const [date,time] = iso.split('T'); const [h,m] = time.split(':'); return new Date(date+'T'+h+':'+m+':00'); };
  const sr = parse(sunriseIso), ss = parse(sunsetIso), now = new Date();
  const total = ss - sr, elapsed = now - sr;
  const pct = Math.max(0, Math.min(1, elapsed / total));

  const dot     = document.getElementById('sun-dot');
  const elapsed_arc = document.getElementById('arc-elapsed');

  // Bezier point for sun position: P0=(20,82), P1=(250,-8), P2=(480,82)
  const t = pct;
  const bx = (1-t)*(1-t)*20 + 2*(1-t)*t*250 + t*t*480;
  const by = (1-t)*(1-t)*82 + 2*(1-t)*t*(-8) + t*t*82;

  elapsed_arc.setAttribute('stroke-dasharray', pct+' 1');
  if(pct > 0 && pct <= 1){
    dot.setAttribute('cx', bx.toFixed(1));
    dot.setAttribute('cy', by.toFixed(1));
    dot.setAttribute('opacity','1');
  } else {
    dot.setAttribute('opacity','0');
  }

  // Daylight duration
  const totalMin = Math.round(total / 60000);
  const dh = Math.floor(totalMin/60), dm = totalMin%60;
  document.getElementById('d-daylight').textContent =
    'Day length: '+dh+'h '+dm+'m';
}

// ════════════════════════════════
//  Build octa segments (once)
// ════════════════════════════════
(function buildOcta(){
  const wrap = document.getElementById('octa-segs');
  for(let i=0;i<8;i++){
    const s = document.createElement('div');
    s.className = 'octa-seg';
    s.id = 'octa-'+i;
    wrap.appendChild(s);
  }
})();

// ════════════════════════════════
//  DOM update
// ════════════════════════════════
function g(id){ return document.getElementById(id); }
function setBar(id, pct){ const b = g(id); if(b) b.style.width = Math.min(100, Math.max(0, pct))+'%'; }

function applyData(data){
  // Hero
  g('h-ico').textContent  = cloudIcon(data.cloud_octa, data.precip_10m);
  g('h-temp').textContent = data.temp_c != null ? Math.round(data.temp_c)+'°C' : '--°C';
  g('h-cond').textContent = cloudText(data.cloud_octa, data.precip_10m) || '—';
  const hi = heatIndex(data.temp_c, data.rh);
  const subParts = [];
  if(data.dew_c != null) subParts.push('Dewpoint '+data.dew_c.toFixed(1)+'°C');
  if(data.rh    != null) subParts.push('Humidity '+Math.round(data.rh)+'%');
  if(hi != null)         subParts.push('Heat index '+hi+'°C');
  g('h-sub').textContent = subParts.join(' · ') || ' ';

  // Wind
  if(data.wind_kt != null){
    g('d-wind').textContent    = data.wind_kt+' kt';
    g('d-wind-bft').textContent= bft(data.wind_ms);
    setBar('b-wind', data.wind_kt / 60 * 100);
  }
  if(data.gust_kt != null){
    g('d-gust').textContent    = data.gust_kt+' kt';
    g('d-gust-sub').textContent= data.wind_kt != null
      ? '+'+(data.gust_kt - data.wind_kt)+' kt above mean' : '';
    setBar('b-gust', data.gust_kt / 60 * 100);
  }

  // Compass
  if(data.wind_dir != null){
    g('d-dir').textContent    = degToCompass(data.wind_dir);
    g('d-dir-deg').textContent= Math.round(data.wind_dir)+'° from North';
    g('compass-arrow').setAttribute('transform','rotate('+data.wind_dir+',40,40)');
  }

  // Humidity
  if(data.rh != null){
    g('d-rh').textContent = Math.round(data.rh)+'%';
    setBar('b-rh', data.rh);
  }

  // Dewpoint
  if(data.dew_c != null){
    g('d-dew').textContent     = data.dew_c.toFixed(1)+'°C';
    g('d-dew-feel').textContent= hi != null ? 'Feels like '+hi+'°C' : '';
  }

  // Pressure
  if(data.slp != null){
    g('d-slp').innerHTML = Math.round(data.slp)+' <span style="font-size:.42em;font-weight:500;color:var(--muted)">hPa</span>';
    g('d-slp-state').textContent = slpState(data.slp);
  }

  // Visibility
  if(data.vis_m != null){
    g('d-vis').textContent     = fmtVis(data.vis_m);
    g('d-vis-qual').textContent= visQual(data.vis_m);
    setBar('b-vis', Math.min(100, data.vis_m / 20000 * 100));
  }

  // Cloud
  if(data.cloud_octa != null){
    g('d-cloud').textContent = cloudLabel(data.cloud_octa);
    const filled = Math.round(data.cloud_octa);
    for(let i=0;i<8;i++){
      g('octa-'+i).classList.toggle('filled', i < filled);
    }
  }

  // Precipitation
  if(data.precip_10m != null){
    g('d-precip').textContent = data.precip_10m.toFixed(1)+' mm';
    setBar('b-precip', Math.min(100, data.precip_10m / 5 * 100));
  }

  // Radiation
  if(data.radiation != null){
    g('d-rad').textContent     = data.radiation+' W/m²';
    g('d-rad-sub').textContent = data.radiation > 800 ? 'Intense' : data.radiation > 400 ? 'Moderate' : data.radiation > 50 ? 'Low' : 'Minimal';
    setBar('b-rad', Math.min(100, data.radiation / 1200 * 100));
  }

  // Obs time
  g('obstime').textContent = data.time ? 'Obs: '+data.time : 'Live data';
}

// ════════════════════════════════
//  Refresh loop
// ════════════════════════════════
const INTERVAL = 5 * 60 * 1000;
let nextRefresh = Date.now() + INTERVAL;
let isLoading   = false;

function updateCountdown(){
  const left = Math.max(0, nextRefresh - Date.now());
  const m = Math.floor(left/60000), s = Math.floor((left%60000)/1000);
  g('countdown').textContent = m+':'+(s < 10 ? '0' : '')+s;
}
setInterval(updateCountdown, 1000);

async function refresh(){
  if(isLoading) return;
  isLoading = true;
  nextRefresh = Date.now() + INTERVAL;
  g('refreshIco').classList.add('spin');

  try{
    const raw  = await fetchKnmiPage();
    const data = knmiToNormalized(parseKnmiBonaire(raw));
    if(data && data.temp_c != null){
      applyData(data);
    } else {
      g('h-cond').textContent = 'Station offline — retrying in 5 min';
      g('obstime').textContent = 'No data';
    }
  }catch(e){
    g('h-cond').textContent = 'Network error';
    g('obstime').textContent = 'Error';
  }

  try{
    const ss = await fetchSunriseSunset();
    g('d-sunrise').textContent = fmtTime(ss.sunrise);
    g('d-sunset').textContent  = fmtTime(ss.sunset);
    updateSunArc(ss.sunrise, ss.sunset);
  }catch(e){}

  g('refreshIco').classList.remove('spin');
  isLoading = false;
}

g('refreshBtn').addEventListener('click', refresh);

refresh();
setInterval(refresh, INTERVAL);

// PWA: register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
